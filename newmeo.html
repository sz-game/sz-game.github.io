<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .mobile-scr-wrap{
  position:relative;
  max-width: 100%;
  margin: 0 auto;
}

.mobile-scr-track{
  display:flex;
  gap: 10px;
  overflow-x: auto;
  scroll-snap-type: x mandatory;
  padding-bottom: 4px;
  -ms-overflow-style: none;
  scrollbar-width: none;
}
.mobile-scr-track::-webkit-scrollbar{ display:none; }

.mobile-scr-card{
  position:relative;
  flex: 0 0 auto;
  width: calc((100vw - 76px) / (3 + 0.25));
  height: calc((calc((100vw - 76px) / (3 + 0.25)) - 4px) * 3 / 2 + calc(8px * 0.5));
  border-radius: 6px;
  overflow:hidden;
  background: var(--surface-2);
  scroll-snap-align: start;
  cursor:pointer;
}
.mobile-scr-card img{
  width:100%; height:100%; object-fit:cover; display:block;
}
.mobile-scr-card:hover .rc-card-label{
  opacity:1;
  transform: translateY(0);
  
}
.mobile-scr-card:hover {
  border: 2px solid yellow;
} 
 
    </style>
</head>
<body>
    <div class="mobile-scr-wrap">
                <div class="mobile-scr-track" class="mobile-scr-track">

                    <div class="mobile-scr-card" onclick="location.href='/g/crossy-road/'"><img src="/assest/potriat/crossy-road.webp" srcset="/assest/potriat/crossy-road.webp 1x, /assest/potriat/crossy-road.webp 2x" loading="lazy" title="Crossy Road" alt="Crossy Road"></div>

                    </svg>
                </button>
